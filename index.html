<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Business Name</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 28px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
    }

    .services {
      margin-top: 35px;
      display: grid;
      gap: 15px;
    }

    .service {
      background: #f1f1f1;
      padding: 15px;
      border-radius: 12px;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Your Business Name</h1>
      <p>
        A short sentence about what you do. For example:
        We help customers with high-quality services at affordable prices.
      </p>

      <div class="services">
        <div class="service">Service 1</div>
        <div class="service">Service 2</div>
        <div class="service">Service 3</div>
      </div>

      <a class="button" href="https://wa.me/1234567890">Contact on WhatsApp</a>

      <footer>
        © 2026 Your Business Name. All rights reserved.
      </footer>
    </div>
  </div>

</body>
</html>
